<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>ML Monitor — Autenticação</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .box { max-width: 420px; padding: 2rem; }
    h1 { font-size: 1.25rem; margin-bottom: .5rem; }
    p { color: #8b949e; line-height: 1.5; }
    a { color: #58a6ff; }
    .spin {
      width: 28px; height: 28px; margin: 0 auto 1.25rem;
      border: 3px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: r 0.8s linear infinite;
    }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spin"></div>
    <h1>Conectando ao ML Monitor…</h1>
    <p id="msg">Redirecionando de volta para o sistema local.</p>
  </div>

  <script>
    // Relay de OAuth do Mercado Livre.
    // O ML redireciona para cá (URL pública HTTPS) e nós reencaminhamos o
    // code/state para o backend local do ML Monitor.
    //
    // A porta local do backend vem embutida no parâmetro 'state', no formato
    // "<account_id>__p<porta>". Assim cada instalação pode usar uma porta
    // diferente sem precisar reconfigurar a redirect URI no Mercado Livre.
    (function () {
      var qs = window.location.search;
      var params = new URLSearchParams(qs);
      var state = params.get("state") || "";

      var isCallback = params.get("code") !== null || params.get("error") !== null;
      if (!isCallback) {
        document.getElementById("msg").textContent =
          "Esta página é usada apenas durante a autorização do Mercado Livre. " +
          "Abra o ML Monitor e inicie a conexão por lá.";
        document.querySelector(".spin").style.display = "none";
        return;
      }

      // Extrai a porta do state; usa 8000 como padrão se não encontrar.
      var portMatch = state.match(/__p(\d+)$/);
      var port = portMatch ? portMatch[1] : "8000";

      var localCallback = "http://localhost:" + port + "/api/v1/ml/callback";
      window.location.replace(localCallback + qs);
    })();
  </script>
</body>
</html>
